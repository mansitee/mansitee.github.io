<html> 
<head>
	<title>Music - Raufu Prezens</title>
	
<style>*{
	margin:0;
	padding:0;
	font-family:sans-serif;
}
.container{
	height:100vh;
	width: 100%;
	background:aqua;
	background-size: cover;
	background-position: center;
	position: relative;
}
.navbar{
	width: 88%;
	margin:auto;
	padding: 15px 0;
	display: flex;
	align-items: center;
	justify-content: space-between;
}
.logo{
	width:90px;
	cursor: pointer;
}
.navbar ul li{
	list-style: none;
	display: inline-block;
	margin: 0 15px;
}
.navbar ul li a{ 
	text-decoration: none;
	color:#5f5f5f;
	font-size: 15;
}
.content{
	width:100%;
	position: absolute:
	top: 30%;
}
.left-col{
	margin-left:6%;
}
.left-col h1{
	font-size:90px;
	color: #fff;
	line-height: 110px;
	float:left;
}
.right-col{
	float:right;
	margin-right:6%;
	margin-top:120px;
	display:flex;
	align-items: center;
}
.right-col p{
	font-size:18px;
	color: #5f5f5f;
	font-weight: 400px;
	margin-right: 15px;
}





#play{
	width:80px;
	cursor:pointer;
}</style>	
	
	<link rel="icon" href="logo.png" type="image/icon">
</head>
<body>
	<div class="container">
		<div class="navbar">
		<img src="img/logo.png" class="logo">
		<ul>
		<li><a href="#">Home</a></li>
		<li><a href="#">About</a></li>
		<li><a href="#">Specifications</a></li>
		<li><a href="#">Products</a></li>
		<li><a href="https://github.com/iamraufu">Connect</a></li>
		</div>
		<div class="content">
			<div class="left-col">
				<h1>The<br>Real<br>Sound</h1>
			</div>
			
			<div class="right-col">
				<p> Click Here To Listen</p>
				<img src="img/play.png" id="play">
			</div>
			
		</div>
		
		<audio id="song">
			<source src="https://str1.mediatelekom.net:9950/stream" type="audio/mp3">
		</audio>
		<script>
		var song = document.getElementById("song");
var play = document.getElementById("play");

play.onclick = function(){
	if (song.paused){
	song.play();
	play.src="pause.png";
	}
	else{
		song.pause();
		play.src="play.png";
	}
}
		</script>
</body>
</html>
